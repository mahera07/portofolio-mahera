<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertifikat | Mahera Sovie Putra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        
        <!-- Tombol Kembali -->
        <a href="index.html" class="back-btn">← KEMBALI</a>

        <!-- Kotak Konten Sertifikat -->
        <div class="card cert-card green">
            <h2>SERTIFIKAT</h2>
            
            <!-- Item Sertifikat 1 -->
            <div class="cert-item">
                <img src="img/sertifikat-web.jpg" alt="Sertifikat Web Dev" class="cert-img">
                <div class="cert-info">
                    <h3 class="cert-title"><span class="cert-icon">🎓</span> Sertifikasi Dasar Pemrograman Web</h3>
                    <p>Diterbitkan oleh: Nama Institusi/Platform</p>
                </div>
            </div>

            <!-- Item Sertifikat 2 -->
            <div class="cert-item">
                <img src="img/sertifikat-kkn.jpg" alt="Sertifikat KKN" class="cert-img">
                <div class="cert-info">
                    <h3 class="cert-title"><span class="cert-icon">📜</span> Juara 2 sprimnt camp</h3>
                    <p>Penghargaan juara 2 pada kegiatan sprint camp.</p>
                </div>
            </div>

            <!-- Item Sertifikat 3 -->
            <div class="cert-item">
                <img src="img/sertifikat-ai.jpg" alt="Sertifikat AI" class="cert-img">
                <div class="cert-info">
                    <h3 class="cert-title"><span class="cert-icon">🏅</span> Machine Learning Basic Course</h3>
                    <p>Diterbitkan oleh: Nama Institusi/Platform</p>
                </div>
            </div>

        </div>

    </div>
</body>
</html>
